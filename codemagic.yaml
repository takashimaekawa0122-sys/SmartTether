workflows:

  # ─────────────────────────────────────────────
  # iOS ビルド確認用（署名なし）
  # 無料Apple Developerアカウント向け。
  # コンパイルが通るか確認するためのビルド。
  # ─────────────────────────────────────────────
  ios-no-sign:
    name: iOS ビルド確認（署名なし）
    max_build_duration: 60

    instance_type: mac_mini_m2

    environment:
      flutter: 3.29.2
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.smarttether.smartTether

    scripts:
      # 1. Flutter依存パッケージを取得
      - name: Flutter パッケージ取得
        script: flutter pub get

      # 2. 静的解析（エラーがないことを確認）
      - name: Flutter 静的解析
        script: flutter analyze --no-pub

      # 3. ユニットテスト実行
      - name: Flutter テスト
        script: flutter test --no-pub

      # 4. CocoaPods インストール
      - name: CocoaPods インストール
        script: |
          cd ios
          pod install

      # 5. 署名なしでビルド（コンパイル確認のみ）
      - name: iOS ビルド（署名なし）
        script: flutter build ios --release --no-codesign

    # ビルド成果物（.appファイル）
    artifacts:
      - build/ios/iphoneos/Runner.app
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - takashi.maekawa0122@gmail.com
        notify:
          success: true
          failure: true
