name: smart_tether
description: "Smart Tether - 置き忘れ防止＆ステルス操作アプリ（Xiaomi Smart Band 9連携）"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # BLE通信
  flutter_reactive_ble: ^5.3.2

  # バックグラウンド処理
  flutter_background_service: ^5.1.0

  # セキュリティ（Keychain/Keystore）
  flutter_secure_storage: ^9.2.2

  # 状態管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 音声録音
  record: ^5.2.0

  # 音声再生（アラート音）
  just_audio: ^0.10.2

  # LEDフラッシュ
  torch_light: ^1.0.1

  # 位置情報（GPS）
  geolocator: ^13.0.2

  # Wi-Fi SSID取得
  network_info_plus: ^6.1.1

  # バッテリー監視
  battery_plus: ^6.0.3

  # ローカル通知
  flutter_local_notifications: ^18.0.1

  # HTTP通信（Avalon API）
  http: ^1.3.0

  # パーミッション管理
  permission_handler: ^11.3.1

  # ローカルデータ保存
  shared_preferences: ^2.3.2

  # 暗号化
  encrypt: ^5.0.3

  # ログ表示用
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.14
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
